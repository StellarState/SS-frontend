name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the information below.

  - type: dropdown
    id: repository
    attributes:
      label: Repository
      description: Which repository is this bug in?
      options:
        - stellarsettle-contracts
        - stellarsettle-api
        - stellarsettle-app
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I try to upload an invoice, the page crashes...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The invoice should upload successfully...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: The page showed an error and crashed...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your development environment
      value: |
        - OS: [e.g., macOS 14.0]
        - Browser: [e.g., Chrome 120]
        - Node.js: [e.g., 22.0.0]
        - Rust: [e.g., 1.83.0]
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste relevant error logs or screenshots
      placeholder: |
        Error: Cannot read property 'amount' of undefined
        at InvoiceService.create (invoice.service.ts:45)
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem