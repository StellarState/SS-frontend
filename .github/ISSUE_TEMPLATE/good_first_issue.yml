name: 🌱 Good First Issue
description: Template for creating beginner-friendly issues
title: "[Good First Issue]: "
labels: ["good-first-issue", "difficulty: easy"]
body:
  - type: markdown
    attributes:
      value: |
        This template helps create issues suitable for first-time contributors.

  - type: dropdown
    id: repository
    attributes:
      label: Repository
      options:
        - stellarsettle-contracts
        - stellarsettle-api
        - stellarsettle-app
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Documentation
        - Testing
        - Bug Fix
        - UI Enhancement
        - Code Cleanup
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: Clear description of what needs to be done
      placeholder: |
        We need to add input validation for the invoice amount field.
        Currently, users can enter negative amounts which causes errors.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is complete?
      placeholder: |
        - [ ] Invoice amount must be positive
        - [ ] Error message shown for invalid input
        - [ ] Unit tests added
        - [ ] Documentation updated
    validations:
      required: true

  - type: textarea
    id: resources
    attributes:
      label: Resources & Hints
      description: Help the contributor get started
      placeholder: |
        Files to modify:
        - src/components/invoices/InvoiceForm.tsx
        - src/lib/validations/invoice.schema.ts
        
        Helpful links:
        - Zod validation: https://zod.dev
        - Similar implementation: src/components/auth/LoginForm.tsx
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - 1 hour
        - 2-3 hours
        - 4-6 hours
    validations:
      required: true

  - type: textarea
    id: mentorship
    attributes:
      label: Mentorship Available
      description: Who can help with this issue?
      placeholder: "@maintainer will be available to answer questions"